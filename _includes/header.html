<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="author" content="{{ site.organizers }}">
  <meta name="description" content="{{ site.description }}">
  <!-- Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"
  />
  <!-- Style -->
  <link rel="stylesheet" href="{{ site.cssurl | relative_url }}/skeleton.css">
  <link rel="stylesheet" href="{{ site.cssurl | relative_url }}/custom.css">
  <!-- Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="{{ site.imageurl | relative_url }}/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.imageurl | relative_url }}/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="{{ site.imageurl | relative_url }}/favicon-16x16.png">
  <link rel="icon" href="{{ '/favicon.ico' | relative_url }}">
  <link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">
  <!-- Title -->
  <title>{{ site.title }}</title>
</head>
